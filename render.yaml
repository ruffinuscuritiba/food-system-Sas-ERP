    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate resolve --rolled-back 20260524000000_add_payment_model 2>/dev/null; npx prisma migrate resolve --rolled-back 20260524000001_add_loyalty_system 2>/dev/null; npx prisma migrate resolve --rolled-back 20260524000002_add_tracking_to_theme 2>/dev/null; npx prisma migrate resolve --rolled-back 20260524000003_add_chat_coupon 2>/dev/null; npx prisma migrate resolve --rolled-back 20260526000000_add_pizza_sizes_borders 2>/dev/null; npx prisma migrate resolve --rolled-back 20260525000000_add_online_orders 2>/dev/null; npx prisma migrate resolve --rolled-back 20260527000000_add_tracking_to_company 2>/dev/null; npx prisma migrate resolve --rolled-back 20260527100000_add_pizza_borders 2>/dev/null; npx prisma migrate resolve --rolled-back 20260527300000_add_complements_beverages_size_config 2>/dev/null; npx prisma migrate resolve --rolled-back 20260528000000_add_product_video 2>/dev/null; npx prisma migrate resolve --rolled-back 20260528200000_add_whatsapp_ai 2>/dev/null; npx prisma migrate resolve --rolled-back 20260529000000_fix_db_sync 2>/dev/null; npx prisma migrate resolve --rolled-back 20260529100000_add_order_type_fields 2>/dev/null; npx prisma migrate resolve --rolled-back 20260530000000_add_sort_order 2>/dev/null; npx prisma migrate resolve --rolled-back 20260530120000_add_white_label_theme 2>/dev/null; npx prisma migrate resolve --rolled-back 20260530170000_pizza_size_config_to_text 2>/dev/null; npx prisma migrate resolve --rolled-back 20260601000000_fix_company_plan_default 2>/dev/null; npx prisma migrate resolve --rolled-back 20260601100000_add_demo_role 2>/dev/null; npx prisma migrate resolve --rolled-back 20260601200000_add_company_archived 2>/dev/null; npx prisma migrate resolve --rolled-back 20260601300000_add_plan_config 2>/dev/null; npx prisma migrate resolve --rolled-back 20260606000000_add_lead 2>/dev/null; npx prisma migrate resolve --rolled-back 20260606100000_add_wa_clicked_at 2>/dev/null; npx prisma migrate resolve --rolled-back 20260607000000_add_delivery_zone_to_order 2>/dev/null; npx prisma migrate resolve --rolled-back 20260610000000_add_driver_earnings 2>/dev/null; npx prisma migrate resolve --rolled-back 20260611000000_add_table_id_to_order 2>/dev/null; npx prisma migrate deploy && npm run build
