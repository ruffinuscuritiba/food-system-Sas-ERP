name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          echo "Pinging backend at $(date)"
          curl -sf https://food-system-backend-no7d.onrender.com/api/health \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            || echo "Backend respondeu com erro mas está acordado"
