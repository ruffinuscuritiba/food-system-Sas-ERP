version: "3.9"

# ── Como usar ─────────────────────────────────────────────────────────────────
# Copie .env.example para .env e preencha os valores antes de rodar:
#   cp .env.example .env
#   docker compose up -d
#
# Para acessar o banco localmente (pgAdmin, DBeaver):
#   docker compose exec db psql -U postgres foodsystem
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-foodsystem}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # Porta NÃO exposta no host intencionalmente (segurança VPS).
    # Para dev local com pgAdmin: adicione "ports: ['5432:5432']" em override.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend NestJS (porta 3001) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-foodsystem}
      JWT_SECRET:    ${JWT_SECRET:?JWT_SECRET is required — set in .env}
      SUPER_ADMIN_EMAIL:    ${SUPER_ADMIN_EMAIL:-superadmin@system.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD is required}
      PORT:          3001
      BACKEND_URL:   ${BACKEND_URL:-http://localhost:3001}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost:3000}
      # Opcionais — descomente e preencha no .env:
      # CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      # CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      # CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # GEMINI_API_KEY:        ${GEMINI_API_KEY}
      # ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Frontend Next.js (porta 3000) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_SOCKET_URL:   ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
