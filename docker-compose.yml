version: "3.9"

services:
  # ── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       foodsystem
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend NestJS (porta 3001) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL:  postgresql://postgres:postgres@db:5432/foodsystem
      JWT_SECRET:    dev-secret-troque-em-producao
      PORT:          3001
      BACKEND_URL:   http://localhost:3001
      FRONTEND_URL:  http://localhost:3000
      # Descomente para usar Cloudinary no local:
      # CLOUDINARY_CLOUD_NAME:
      # CLOUDINARY_API_KEY:
      # CLOUDINARY_API_SECRET:
      # Descomente para usar IA no local:
      # GEMINI_API_KEY:
      # ANTHROPIC_API_KEY:
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend Next.js (porta 3000) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:     http://localhost:3001/api
        NEXT_PUBLIC_SOCKET_URL:  http://localhost:3001
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_OUTPUT: standalone
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
